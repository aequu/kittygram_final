server {
  listen 80;
  index index.html;
  server_tokens off;
  client_max_body_size 10M;

  location /api/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000 ;
  }
  location /admin/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000;
  }

  location /media/ {
    alias /app/media/;
    expires 7d;
    add_header Cache-Control "public";
  } 

  location / {
    root /static;
    try_files $uri $uri/ /index.html;
  }
}